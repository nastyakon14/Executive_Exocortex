version: "3.9"

services:
  # neo4j — основное хранилище графа знаний
  neo4j:
    image: neo4j:5.26-community  # версия с поддержкой vector index
    container_name: exocortex_neo4j
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol (для драйвера)
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # http (neo4j browser)
    volumes:
      - ./storage/neo4j/data:/data
      - ./storage/neo4j/logs:/logs
    environment:
      # начальный пароль задаётся в .env (NEO4J_PASSWORD)
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      # разрешаем удалённые подключения
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474
      # настройки памяти (подстройте под машину)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # chromadb — устаревшее хранилище (профиль legacy)
  chromadb:
    image: chromadb/chroma:latest
    container_name: exocortex_chroma
    profiles:
      - legacy  # docker compose --profile legacy up
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - ./storage/chromadb/data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # База данных для Langfuse
  langfuse-db:
    image: postgres:15
    container_name: langfuse_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    ports:
      - "5432:5432"
    volumes:
      - ./storage/langfuse/db:/var/lib/postgresql/data

  # Сервер Langfuse
  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse_server
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=my_super_secret_key_change_me # Задайте случайную строку
      - SALT=my_super_secret_salt_change_me         # Задайте случайную строку
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    restart: unless-stopped